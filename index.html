<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bridwell Limited</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
}

/* HERO */

.hero{
min-height:100vh;
background:url("bg.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
position:relative;
color:white;
text-align:left;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to right, rgba(0,0,0,0.6), rgba(0,0,0,0.2));
}

.content{
position:relative;
max-width:600px;
}

.logo{
width:160px;
margin-bottom:20px;
background:white;   /* FIX for white box issue */
padding:5px;
border-radius:5px;
}

h1{
font-size:42px;
margin-bottom:15px;
}

p{
font-size:18px;
margin-bottom:25px;
}

.btn{
background:#5b6b2c;
color:white;
padding:12px 25px;
text-decoration:none;
border-radius:6px;
display:inline-block;
}

footer{
text-align:center;
padding:10px;
background:#000;
color:white;
font-size:14px;
}

/* MOBILE */

@media (max-width:768px){

.hero{
text-align:center;
}

h1{
font-size:26px;
}

p{
font-size:15px;
}

.logo{
width:130px;
}

.btn{
width:100%;
}

}

</style>

</head>

<body>

<div class="hero">

<div class="content">

<img src="logo.png" class="logo">

<h1>A New Leaf for Idukki’s Legacy</h1>

<p>
<strong>Bridwell Limited:</strong> Your Trusted Partner in Cardamom Health.<br>
Full site growing soon.
</p>

<a class="btn" href="https://wa.me/917902751153">
Connect With Us
</a>

</div>

</div>

<footer>
© Bridwell Limited | Idukki, Kerala
</footer>

</body>
</html>
