<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bridwell Limited</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
}

/* HERO SECTION */

.hero{
min-height:100vh;
background:url("bg.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:flex-start;
padding:40px;
position:relative;
color:white;
}

/* DARK OVERLAY */

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to right, rgba(0,0,0,0.75), rgba(0,0,0,0.2));
}

/* CONTENT */

.content{
position:relative;
max-width:600px;
z-index:2;
}

.logo{
width:150px;
margin-bottom:20px;
}

h1{
font-size:42px;
margin-bottom:15px;
line-height:1.2;
}

p{
font-size:18px;
margin-bottom:25px;
line-height:1.5;
}

/* BUTTON */

.btn{
background:#5b6b2c;
color:white;
padding:12px 25px;
text-decoration:none;
border-radius:6px;
display:inline-block;
font-weight:bold;
}

/* FOOTER */

footer{
text-align:center;
padding:12px;
background:#000;
color:white;
font-size:14px;
}

/* MOBILE FIX */

@media (max-width:768px){

.hero{
justify-content:center;
text-align:center;
padding:20px;
}

.content{
max-width:100%;
}

.logo{
width:120px;
}

h1{
font-size:26px;
}

p{
font-size:15px;
}

.btn{
width:100%;
}

}

</style>

</head>

<body>

<div class="hero">

<div class="content">

<img src="logo.png" class="logo">

<h1>A New Leaf for Idukki’s Legacy</h1>

<p>
<strong>Bridwell Limited:</strong> Your Trusted Partner in Cardamom Health.<br>
Full site growing soon.
</p>

<a class="btn" href="https://wa.me/917902751153">
Connect With Us
</a>

</div>

</div>

<footer>
© Bridwell Limited | Idukki, Kerala, India
</footer>

</body>
</html>
